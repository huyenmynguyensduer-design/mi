<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>第5课 认识生产线 闯关游戏</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0a1628;color:#e8f4fd;font-family:'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;min-height:100vh;padding:20px 16px 60px;}
.container{max-width:740px;margin:0 auto;}
.top-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;gap:12px;}
.score-bar{color:#ffd700;font-weight:900;font-size:0.9rem;white-space:nowrap;}
.progress-wrap{flex:1;height:8px;background:rgba(255,255,255,0.1);border-radius:40px;overflow:hidden;}
.progress-bar{height:100%;background:linear-gradient(90deg,#00d4ff,#00e676);border-radius:40px;transition:width 0.5s;}
.lives{font-size:0.95rem;white-space:nowrap;}
.combo-bar{text-align:center;height:26px;margin-bottom:8px;font-weight:900;font-size:0.95rem;color:#ffd700;transition:opacity 0.4s;}
.timer-bar{text-align:center;font-size:0.8rem;color:#8ba7c7;margin-bottom:12px;font-weight:700;}
.level-banner{text-align:center;margin-bottom:14px;}
.level-num{display:inline-block;background:linear-gradient(135deg,#00d4ff,#0099cc);color:#0a1628;font-size:0.7rem;font-weight:900;letter-spacing:3px;padding:4px 14px;border-radius:40px;margin-bottom:6px;}
.level-type{font-size:0.82rem;color:#8ba7c7;margin-top:4px;}
.game-row{display:flex;align-items:flex-start;gap:14px;}
.question-card{flex:1;background:#112240;border-radius:20px;padding:22px 18px;border:1px solid rgba(0,212,255,0.15);box-shadow:0 8px 32px rgba(0,0,0,0.4);}
.q-num{display:inline-block;background:rgba(0,212,255,0.15);color:#00d4ff;border-radius:8px;padding:2px 10px;font-size:0.75rem;font-weight:900;margin-bottom:10px;}
.q-text{font-size:1rem;font-weight:700;line-height:1.7;margin-bottom:18px;}
.options-list{display:flex;flex-direction:column;gap:9px;}
.option-btn{background:rgba(255,255,255,0.04);border:1.5px solid rgba(255,255,255,0.1);border-radius:14px;padding:12px 14px;color:#e8f4fd;font-size:0.92rem;font-family:inherit;text-align:left;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;gap:10px;}
.option-btn:hover:not(:disabled){background:rgba(0,212,255,0.08);border-color:rgba(0,212,255,0.4);}
.opt-letter{width:26px;height:26px;border-radius:7px;background:rgba(255,255,255,0.08);display:flex;align-items:center;justify-content:center;font-weight:900;font-size:0.78rem;flex-shrink:0;}
.option-btn.correct{background:rgba(0,230,118,0.12);border-color:#00e676;color:#00e676;}
.option-btn.correct .opt-letter{background:#00e676;color:#000;}
.option-btn.wrong{background:rgba(255,23,68,0.1);border-color:#ff1744;color:#ff6b6b;}
.option-btn.wrong .opt-letter{background:#ff1744;color:#fff;}
.option-btn:disabled{cursor:not-allowed;}
.fill-input{width:100%;background:rgba(255,255,255,0.05);border:1.5px solid rgba(0,212,255,0.25);border-radius:14px;padding:12px 14px;color:#e8f4fd;font-size:1rem;font-family:inherit;outline:none;transition:0.2s;margin-bottom:10px;}
.fill-input:focus{border-color:#00d4ff;box-shadow:0 0 0 3px rgba(0,212,255,0.15);}
.fill-input.correct{border-color:#00e676;background:rgba(0,230,118,0.08);color:#00e676;}
.fill-input.wrong{border-color:#ff1744;background:rgba(255,23,68,0.08);color:#ff6b6b;}
.word-choices{display:flex;gap:9px;flex-wrap:wrap;margin-top:10px;}
.word-btn{background:rgba(255,255,255,0.06);border:1.5px solid rgba(255,255,255,0.15);border-radius:40px;padding:9px 20px;color:#e8f4fd;font-size:1rem;font-family:inherit;cursor:pointer;transition:0.2s;font-weight:700;}
.word-btn:hover:not(:disabled){background:rgba(0,212,255,0.1);border-color:#00d4ff;}
.word-btn.correct{background:rgba(0,230,118,0.15);border-color:#00e676;color:#00e676;}
.word-btn.wrong{background:rgba(255,23,68,0.1);border-color:#ff1744;color:#ff6b6b;}
.word-btn:disabled{cursor:not-allowed;}
.submit-btn{width:100%;padding:13px;background:linear-gradient(135deg,#00d4ff,#0099cc);color:#0a1628;border:none;border-radius:14px;font-size:0.95rem;font-weight:900;font-family:inherit;cursor:pointer;transition:0.2s;margin-top:4px;}
.feedback{border-radius:12px;padding:11px 14px;margin-top:10px;font-weight:700;font-size:0.9rem;display:none;}
.feedback.correct{background:rgba(0,230,118,0.12);border:1px solid rgba(0,230,118,0.3);color:#00e676;}
.feedback.wrong{background:rgba(255,23,68,0.1);border:1px solid rgba(255,23,68,0.3);color:#ff6b6b;}
.explain-box{background:rgba(255,215,0,0.07);border:1px solid rgba(255,215,0,0.2);border-radius:10px;padding:9px 12px;margin-top:7px;font-size:0.82rem;color:#ffd700;line-height:1.6;display:none;}
.next-btn{width:100%;padding:13px;background:linear-gradient(135deg,#00e676,#00b058);color:#000;border:none;border-radius:14px;font-size:0.95rem;font-weight:900;font-family:inherit;cursor:pointer;transition:0.2s;margin-top:10px;display:none;}
.char-col{width:90px;flex-shrink:0;display:flex;flex-direction:column;align-items:center;padding-top:10px;position:sticky;top:20px;}
.xiao-ruan{width:82px;animation:idle 3s ease-in-out infinite;transform-origin:bottom center;}
@keyframes idle{0%,100%{transform:translateY(0);}50%{transform:translateY(-6px);}}
.xiao-ruan.jump{animation:jump 0.6s cubic-bezier(.4,0,.2,1) forwards!important;}
@keyframes jump{0%{transform:translateY(0) scaleX(1) scaleY(1);}20%{transform:translateY(-4px) scaleX(1.1) scaleY(0.9);}45%{transform:translateY(-42px) scaleX(0.92) scaleY(1.12);}70%{transform:translateY(-20px) scaleX(1.05) scaleY(0.95);}85%{transform:translateY(-4px);}100%{transform:translateY(0) scaleX(1) scaleY(1);}}
.xiao-ruan.shake{animation:noshake 0.6s ease forwards!important;}
@keyframes noshake{0%{transform:rotate(0);}15%{transform:rotate(-15deg);}35%{transform:rotate(13deg);}55%{transform:rotate(-10deg);}75%{transform:rotate(7deg);}100%{transform:rotate(0);}}
.char-name{font-size:0.65rem;color:#8ba7c7;margin-top:5px;font-weight:700;text-align:center;letter-spacing:1px;}
.speech-bubble{background:#1e3a5f;border:1.5px solid rgba(0,212,255,0.3);border-radius:10px;padding:5px 8px;font-size:0.65rem;color:#00d4ff;text-align:center;margin-bottom:6px;position:relative;min-width:72px;line-height:1.4;}
.speech-bubble::after{content:'';position:absolute;bottom:-7px;left:50%;transform:translateX(-50%);border:4px solid transparent;border-top-color:#1e3a5f;}
@keyframes bubblePop{from{opacity:0;transform:scale(0.8);}to{opacity:1;transform:scale(1);}}
.overlay{position:fixed;inset:0;background:rgba(10,22,40,0.93);backdrop-filter:blur(8px);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px;overflow-y:auto;}
.result-box{background:#112240;border-radius:28px;padding:32px 24px;max-width:460px;width:100%;text-align:center;border:1px solid rgba(0,212,255,0.2);box-shadow:0 24px 80px rgba(0,0,0,0.6);}
.result-icon{font-size:3rem;margin-bottom:10px;display:block;}
.result-title{font-size:1.5rem;font-weight:900;margin-bottom:6px;color:#ffd700;}
.result-sub{color:#8ba7c7;margin-bottom:12px;font-size:0.88rem;}
.score-display{font-size:2.8rem;font-weight:900;color:#ffd700;margin:10px 0;}
.stat-row{display:flex;justify-content:center;gap:20px;margin-bottom:14px;font-size:0.85rem;color:#8ba7c7;}
.stat-row span{color:#e8f4fd;font-weight:700;}
.wrong-list{text-align:left;background:rgba(0,0,0,0.2);border-radius:14px;padding:12px;margin-bottom:12px;max-height:200px;overflow-y:auto;}
.wrong-item{border-left:3px solid #ff6b6b;padding:7px 10px;margin-bottom:7px;font-size:0.8rem;line-height:1.5;}
.wrong-q{color:#e8f4fd;margin-bottom:2px;}
.wrong-ans{color:#00e676;}
.action-btns{display:flex;flex-direction:column;gap:9px;margin-top:4px;}
.restart-btn{width:100%;padding:12px;background:linear-gradient(135deg,#ff6b35,#ff3d00);color:#fff;border:none;border-radius:14px;font-size:0.92rem;font-weight:900;font-family:inherit;cursor:pointer;}
.retry-btn{width:100%;padding:12px;background:linear-gradient(135deg,#7c3aed,#4f46e5);color:#fff;border:none;border-radius:14px;font-size:0.92rem;font-weight:900;font-family:inherit;cursor:pointer;}
.share-btn{width:100%;padding:12px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);color:#e8f4fd;border-radius:14px;font-size:0.92rem;font-weight:900;font-family:inherit;cursor:pointer;}
.score-pop{position:fixed;font-size:1.4rem;font-weight:900;color:#ffd700;pointer-events:none;z-index:200;animation:scoreFly 1.2s ease forwards;}
@keyframes scoreFly{0%{opacity:1;transform:translateY(0);}100%{opacity:0;transform:translateY(-70px);}}
</style>
</head>

function setBubble(text){var b=document.getElementById("bubble");b.textContent=text;b.style.animation="none";requestAnimationFrame(function(){b.style.animation="bubblePop 0.3s ease";});}
function charJump(){var c=document.getElementById("xiaoRuan");if(!c)return;c.classList.remove("shake");c.classList.add("jump");setBubble(BC[Math.floor(Math.random()*BC.length)]);setTimeout(function(){c.classList.remove("jump");setBubble(BI[Math.floor(Math.random()*BI.length)]);},700);}
function charShake(){var c=document.getElementById("xiaoRuan");if(!c)return;c.classList.remove("jump");c.classList.add("shake");setBubble(BW[Math.floor(Math.random()*BW.length)]);setTimeout(function(){c.classList.remove("shake");setBubble(BI[Math.floor(Math.random()*BI.length)]);},700);}
function render(){var pool=retryMode?retryQ:Q;if(cur>=pool.length){showFinal();return;}answered=false;var q=pool[cur];document.getElementById("progressBar").style.width=(cur/pool.length*100)+"%";document.getElementById("levelNum").textContent=(retryMode?"错题 ":"第 ")+(cur+1)+" 关";document.getElementById("levelType").textContent=q.s;document.getElementById("qNum").textContent="Q"+(cur+1)+" / "+pool.length;document.getElementById("qText").textContent=q.q;var fb=document.getElementById("feedback");fb.style.display="none";fb.className="feedback";document.getElementById("explainBox").style.display="none";document.getElementById("nextBtn").style.display="none";var body=document.getElementById("qBody");body.innerHTML="";if(q.t==="choice")renderChoice(q,body);else if(q.t==="fill")renderFill(q,body);else renderWord(q,body);setBubble(BI[Math.floor(Math.random()*BI.length)]);}
function renderChoice(q,body){var list=document.createElement("div");list.className="options-list";var texts=q.ops.map(function(op){return op.slice(3);}),ct="";for(var k=0;k<q.ops.length;k++){if(q.ops[k].charAt(0)===q.a){ct=q.ops[k].slice(3);break;}}var sh=shuffle(texts),lt=["A","B","C","D"],na="";for(var i=0;i<sh.length;i++){if(sh[i]===ct)na=lt[i];}for(var i=0;i<sh.length;i++){(function(text,letter,ans){var btn=document.createElement("button");btn.className="option-btn";btn.innerHTML='<span class="opt-letter">'+letter+'</span><span>'+text+'</span>';btn.onclick=function(){submitChoice(letter,btn,list,ans);};list.appendChild(btn);})(sh[i],lt[i],na);}body.appendChild(list);}
function renderFill(q,body){var inp=document.createElement("input");inp.type="text";inp.className="fill-input";inp.placeholder=q.h||"请输入答案";inp.autocomplete="off";body.appendChild(inp);var btn=document.createElement("button");btn.className="submit-btn";btn.textContent="确认答案";btn.onclick=function(){submitFill(inp,q.a,q);};body.appendChild(btn);inp.onkeydown=function(e){if(e.key==="Enter")submitFill(inp,q.a,q);};setTimeout(function(){inp.focus();},200);}
function renderWord(q,body){var wrap=document.createElement("div");wrap.className="word-choices";for(var i=0;i<q.ops.length;i++){(function(opt){var btn=document.createElement("button");btn.className="word-btn";btn.textContent=opt;btn.onclick=function(){submitWord(opt,btn,wrap,q.a,q);};wrap.appendChild(btn);})(q.ops[i]);}body.appendChild(wrap);}
function submitChoice(sel,btn,list,ans){if(answered)return;var pool=retryMode?retryQ:Q,q=pool[cur];answered=true;var btns=list.querySelectorAll(".option-btn");for(var i=0;i<btns.length;i++)btns[i].disabled=true;if(sel===ans){btn.classList.add("correct");onCorrect(q);}else{btn.classList.add("wrong");for(var i=0;i<btns.length;i++){if(btns[i].querySelector(".opt-letter").textContent===ans)btns[i].classList.add("correct");}onWrong(ans,q);}}
function submitFill(inp,ans,q){if(answered)return;var val=inp.value.trim();if(!val)return;answered=true;inp.disabled=true;var norm=function(s){return s.replace(/\s+/g," ").trim().toLowerCase();};if(norm(val)===norm(ans)){inp.classList.add("correct");onCorrect(q);}else{inp.classList.add("wrong");onWrong(ans,q);}}
function submitWord(sel,btn,wrap,ans,q){if(answered)return;answered=true;var btns=wrap.querySelectorAll(".word-btn");for(var i=0;i<btns.length;i++)btns[i].disabled=true;if(sel===ans){btn.classList.add("correct");onCorrect(q);}else{btn.classList.add("wrong");for(var i=0;i<btns.length;i++){if(btns[i].textContent===ans)btns[i].classList.add("correct");}onWrong(ans,q);}}
function onCorrect(q){score+=10;combo++;document.getElementById("scoreNum").textContent=score;showFeedback(true,"答对了！+10分");showExplain(q.e);showScorePop("+10");if(combo>=3)showCombo(combo);charJump();showNext();}
function onWrong(ans,q){combo=0;document.getElementById("comboBar").style.opacity="0";lives--;updateLives();showFeedback(false,"答错了！正确答案："+ans);showExplain(q.e);if(!retryMode)wrongList.push(q);charShake();if(lives<=0){setTimeout(showGameOver,900);return;}showNext();}
function showFeedback(ok,msg){var fb=document.getElementById("feedback");fb.textContent=(ok?"✅ ":"❌ ")+msg;fb.className="feedback "+(ok?"correct":"wrong");fb.style.display="block";}
function showExplain(e){if(!e)return;var box=document.getElementById("explainBox");box.textContent="💡 "+e;box.style.display="block";}
function showCombo(n){var bar=document.getElementById("comboBar"),icon=n>=8?"🏆":(n>=6?"⚡":"🔥");bar.textContent=icon+" "+n+"连击！太厉害了！";bar.style.opacity="1";setTimeout(function(){bar.style.opacity="0";},2000);}
function showScorePop(text){var el=document.createElement("div");el.className="score-pop";el.textContent=text;var card=document.getElementById("questionCard").getBoundingClientRect();el.style.left=(card.left+card.width/2-20)+"px";el.style.top=(card.top+40)+"px";document.body.appendChild(el);setTimeout(function(){el.remove();},1200);}
function showNext(){var pool=retryMode?retryQ:Q,btn=document.getElementById("nextBtn");btn.style.display="block";btn.textContent=cur===pool.length-1?"查看最终成绩 🏆":"下一关 →";}
function nextQ(){cur++;render();}
function buildWrongHtml(){if(wrongList.length===0)return'<div style="color:#00e676;padding:8px;">全部答对！🎉</div>';var h="";for(var i=0;i<wrongList.length;i++){h+='<div class="wrong-item"><div class="wrong-q">Q'+(i+1)+'. '+wrongList[i].q+'</div><div class="wrong-ans">✅ '+wrongList[i].a+'</div></div>';}return h;}
function showGameOver(){var t=stopTimer();document.getElementById("resultBox").innerHTML='<span class="result-icon">💔</span><div class="result-title">挑战失败</div><div class="result-sub">命值耗尽，再接再厉！</div><div class="score-display">'+score+'</div><div class="stat-row"><div>完成 <span>'+cur+'/'+TOTAL+'</span></div><div>用时 <span>'+t+'</span></div><div>错题 <span>'+wrongList.length+'</span></div></div><div style="font-size:0.85rem;color:#8ba7c7;margin-bottom:8px;text-align:left;font-weight:700;">错题回顾：</div><div class="wrong-list">'+buildWrongHtml()+'</div><div class="action-btns">'+(wrongList.length>0?'<button class="retry-btn" onclick="startRetry()">📚 只练错题</button>':'')+'<button class="restart-btn" onclick="restart()">🔄 重新开始</button></div>';document.getElementById("overlay").style.display="flex";}
function showFinal(){var t=stopTimer();document.getElementById("progressBar").style.width="100%";var g=score>=190?"满分通关！🥇":score>=160?"优秀 🥈":score>=120?"良好 🥉":"继续加油 💪",st="我在《认识生产线》闯关游戏中得了"+score+"分，用时"+t+"，错了"+wrongList.length+"题！";document.getElementById("resultBox").innerHTML='<span class="result-icon">🏆</span><div class="result-title">'+g+'</div><div class="result-sub">第5课全部闯关完成！</div><div class="score-display">'+score+'</div><div class="stat-row"><div>共<span>'+TOTAL+'</span>关</div><div>用时<span>'+t+'</span></div><div>剩余<span>'+lives+'</span>命</div></div>'+(wrongList.length>0?'<div style="font-size:0.85rem;color:#8ba7c7;margin-bottom:8px;text-align:left;font-weight:700;">错题（'+wrongList.length+'题）：</div><div class="wrong-list">'+buildWrongHtml()+'</div>':'<div style="color:#00e676;margin-bottom:12px;">🎉 全部答对！完美通关！</div>')+'<div class="action-btns">'+(wrongList.length>0?'<button class="retry-btn" onclick="startRetry()">📚 只练错题</button>':'')+'<button class="share-btn" onclick="copyShare()">📋 复制成绩分享</button><button class="restart-btn" onclick="restart()">🔄 再挑战一次</button></div>';document.getElementById("overlay").style.display="flex";window._shareText=st;}
function copyShare(){var text=window._shareText||"";if(navigator.clipboard){navigator.clipboard.writeText(text).then(function(){alert("成绩已复制！😊");});}else{prompt("复制分享：",text);}}
function startRetry(){retryMode=true;retryQ=wrongList.slice();wrongList=[];cur=0;answered=false;document.getElementById("overlay").style.display="none";startTimer();render();}
function restart(){cur=0;lives=6;score=0;answered=false;combo=0;wrongList=[];retryMode=false;retryQ=[];document.getElementById("scoreNum").textContent="0";document.getElementById("comboBar").style.opacity="0";updateLives();document.getElementById("overlay").style.display="none";startTimer();render();}
updateLives();startTimer();render();
</script>
</body>
</html>
